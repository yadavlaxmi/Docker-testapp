services:
  mongo:
    image: mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: laxmi
      MONGO_INITDB_ROOT_PASSWORD: 1234


  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: laxmi
      ME_CONFIG_MONGODB_ADMINPASSWORD: 1234
      ME_CONFIG_MONGODB_URL: mongodb://laxmi:1234@mongo:27017/?authSource=admin
  
  backend:
    build: .
    ports:
      - "5050:5050"
    environment:
      MONGO_URL: mongodb://laxmi:1234@mongo:27017/docker-db?authSource=admin
    depends_on:
      - mongo